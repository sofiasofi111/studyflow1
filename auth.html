<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* # форма входа и регистрации */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .auth-card {
            width: min(520px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 58px rgba(15, 23, 42, 0.08);
            padding: 38px;
        }
        .auth-card h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }
        .auth-card p {
            margin: 0 0 28px;
            color: var(--muted);
            max-width: 420px;
        }
        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-field label {
            font-size: 0.95rem;
            color: var(--muted);
        }
        .auth-field .password-wrapper {
            position: relative;
        }
        .auth-field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
        }
        .auth-field .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .auth-field .toggle-password::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .auth-field .toggle-password.active::before {
            background: var(--text);
            transform: scale(1.2);
        }
        .auth-hint {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .auth-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: flex-start;
        }
        .auth-actions button {
            flex: 1 1 150px;
            min-width: 140px;
            border: 1px solid transparent;
            background: var(--text);
            color: #ffffff;
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 700;
        }
        .auth-toggle {
            flex: 1 1 100%;
            width: 100%;
        }
        .auth-actions button:hover {
            background: #111111;
        }
        .auth-toggle {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .auth-toggle a {
            color: var(--text);
            text-decoration: underline;
            cursor: pointer;
        }
        .message {
            margin-top: 18px;
            color: var(--text);
            font-size: 0.95rem;
            min-height: 1.2em;
        }
        @media (max-width: 520px) {
            .auth-card { padding: 24px; }
            .auth-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .auth-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- # страница логина -->
    <div class="auth-card">
        <h1 id="formTitle">Увійти</h1>
        <p id="formSubtitle">Увійдіть, щоб зберегти свої завдання та синхронізувати дані.</p>

        <div class="auth-field" id="usernameField" style="display: none;">
            <label for="usernameInput">Ім'я користувача</label>
            <input id="usernameInput" type="text" placeholder="Ваше имя" autocomplete="username">
        </div>
        <div class="auth-field" id="emailField">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="auth-field">
            <label for="passwordInput">Пароль</label>
            <div class="password-wrapper">
                <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password">
                <button type="button" class="toggle-password" data-target="passwordInput" aria-label="Показати пароль"></button>
            </div>
        </div>
        <div class="auth-field" id="confirmPasswordField" style="display:none;">
            <label for="confirmPasswordInput">Підтвердіть пароль</label>
            <div class="password-wrapper">
                <input id="confirmPasswordInput" type="password" placeholder="Підтвердіть пароль" autocomplete="new-password">
                <button type="button" class="toggle-password" data-target="confirmPasswordInput" aria-label="Показати пароль"></button>
            </div>
        </div>

        <div class="auth-actions">
            <button id="submitBtn" type="button">Увійти</button>
            <span class="auth-toggle" id="toggleText">Немає акаунта? <a href="#" id="toggleLink">Зареєструватись</a></span>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import {
          getAuth,
          createUserWithEmailAndPassword,
          signInWithEmailAndPassword,
          updateProfile
        } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDb9LWLCG9v0ZcEdloFQ5bp5pYA9KiKtfc",
          authDomain: "study-flow-28a0ml.firebaseapp.com",
          projectId: "study-flow-28a0ml",
          storageBucket: "study-flow-28a0ml.firebasestorage.app",
          messagingSenderId: "9757622291",
          appId: "1:9757622291:web:df2e747f28765ab7b43fe6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.firebaseAuth = auth;
        window.firebaseRegister = createUserWithEmailAndPassword;
        window.firebaseLogin = signInWithEmailAndPassword;

        // # скрипт формы входа/регистрации
        const params = new URLSearchParams(window.location.search);
        let mode = params.get('action') === 'register' ? 'register' : 'login';
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const message = document.getElementById('message');
        const confirmField = document.getElementById('confirmPasswordField');

        // отображает сообщение пользователю в интерфейсе; при isError=false показывает успех.
        function showMessage(text, isError = true) {
            message.textContent = text;
            message.style.color = isError ? 'var(--danger)' : 'var(--primary)';
        }

        // переключает видимость пароля (показ/скрытие) для поля с указанным id.
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const button = input.parentElement.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                if (button) button.classList.add('active');
            } else {
                input.type = 'password';
                if (button) button.classList.remove('active');
            }
        }

        // переключает режим формы между 'register' и 'login', обновляет заголовки и видимость полей.
        function switchMode(newMode) {
            mode = newMode;
            const registration = mode === 'register';
            formTitle.textContent = registration ? 'Реєстрація' : 'Увійти';
            formSubtitle.textContent = registration ? 'Створіть обліковий запис, щоб зберігати плани.' : 'Увійдіть до свого акаунту.';
            submitBtn.textContent = registration ? 'Зареєструватись' : 'Увійти';
            const usernameField = document.getElementById('usernameField');
            const emailField = document.getElementById('emailField');
            usernameField.style.display = registration ? 'flex' : 'none';
            emailField.style.display = 'flex';
            confirmField.style.display = registration ? 'flex' : 'none';
            const promptText = registration ? 'Вже є акаунт? ' : 'Немає акаунта? ';
            toggleText.textContent = promptText;
            toggleText.appendChild(toggleLink);
            toggleLink.textContent = registration ? 'Увійти' : 'Зареєструватись';
            message.textContent = '';
        }

        // обрабатывает отправку формы: регистрация или вход через Firebase Auth.
        async function submitForm() {
            const username = document.getElementById('usernameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;

            if (!email || !password) {
                showMessage('Заповніть усі поля.');
                return;
            }
            if (mode === 'register' && !username) {
                showMessage('Заповніть усі поля.');
                return;
            }

            try {
                if (mode === 'register') {
                    if (password !== confirmPassword) {
                        showMessage('Паролі не співпадають.');
                        return;
                    }

                    const userCredential = await window.firebaseRegister(
                        window.firebaseAuth,
                        email,
                        password
                    );

                    await updateProfile(userCredential.user, {
                        displayName: username
                    });

                    localStorage.setItem('plannerCurrentUser', username);

                    showMessage(
                        'Реєстрація успішна! Перенаправлення...',
                        false
                    );

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);

                } else {
                    const userCredential = await window.firebaseLogin(
                        window.firebaseAuth,
                        email,
                        password
                    );
                    const user = userCredential.user;
                    const displayName = user.displayName || username || email;
                    localStorage.setItem('plannerCurrentUser', displayName);

                    showMessage(
                        'Вхід успішний! Перенаправлення...',
                        false
                    );

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }

            } catch (error) {
                showMessage(error.message);
            }
        }

        const toggleLink = document.getElementById('toggleLink');
        const passwordToggles = document.querySelectorAll('.toggle-password');

        submitBtn.addEventListener('click', submitForm);
        toggleLink.addEventListener('click', (event) => {
            event.preventDefault();
            switchMode(mode === 'register' ? 'login' : 'register');
        });
        passwordToggles.forEach((button) => {
            const target = button.dataset.target;
            if (target) {
                button.addEventListener('click', () => togglePassword(target));
            }
        });

        window.submitForm = submitForm;
        window.togglePassword = togglePassword;
        window.switchMode = switchMode;

        switchMode(mode);
    </script>
</body>
</html>
